# Railway config-as-code — https://docs.railway.com/reference/config-as-code
#
# Build produkuje handler Astro (adapter @astrojs/node w trybie `middleware`) w
# `dist/server/entry.mjs`. Start command uruchamia własny `server.mjs`, który
# opakowuje ten handler w `compression()` (gzip) i serwuje statyki z `dist/client`.
# `HOST=0.0.0.0` jest wymagany, by Railway dobiło się do kontenera; `PORT` Railway
# wstrzykuje automatycznie (server.mjs go czyta).
#
# Wartości tutaj nadpisują ustawienia w dashboardzie (pola stają się read-only),
# więc po wdrożeniu nie trzeba ręcznie zmieniać start command.
#
# Sekrety/zmienne NIE są w tym pliku — ustaw je w dashboardzie per środowisko:
#   - CHECKOUT_ACCESS_KEY=<klucz>   → ustaw na środowisku TESTOWYM/preview:
#                                     włącza bramkę /dostep na CAŁEJ stronie
#                                     (zero crawlingu/indeksacji + X-Robots-Tag
#                                     noindex). Brak na LIVE = strona otwarta.
#   - PUBLIC_* (API base, portal, mocki) — jak dotychczas

[build]
builder = "NIXPACKS"
buildCommand = "npm run build"

[deploy]
startCommand = "HOST=0.0.0.0 node ./server.mjs"
healthcheckPath = "/healthz"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
